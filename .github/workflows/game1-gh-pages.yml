name: Deploy (GitHub Pages)
on:
  push:
    branches: [main]
    paths: ["packages/game1/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/game1

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/game1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          VITE_ANALYTICS_ENDPOINT: ${{ secrets.ANALYTICS_ENDPOINT }}
          VITE_RELEASE_CHANNEL: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/game1/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
