name: CI
on:
  push:
    branches: [main, develop]
    paths: ["packages/game1/**"]
  pull_request:
    branches: [main]
    paths: ["packages/game1/**"]

defaults:
  run:
    working-directory: packages/game1

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/game1/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/game1/dist
