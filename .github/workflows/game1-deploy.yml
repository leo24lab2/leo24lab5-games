name: Deploy (Cloudflare Pages)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          VITE_ANALYTICS_ENDPOINT: ${{ secrets.ANALYTICS_ENDPOINT }}
          VITE_RELEASE_CHANNEL: production

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Debug auth
        run: |
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID} chars"
          echo "API token length: ${#CLOUDFLARE_API_TOKEN} chars"
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "WARNING: CLOUDFLARE_ACCOUNT_ID is empty!"; fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "WARNING: CLOUDFLARE_API_TOKEN is empty!"; fi

      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        run: |
          npx --yes wrangler pages project create leo24lab5-snake --production-branch main 2>&1

      - name: Deploy to Cloudflare Pages
        run: |
          npx --yes wrangler pages deploy dist --project-name=leo24lab5-snake --branch main 2>&1
